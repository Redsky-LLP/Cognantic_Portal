services:
  cognantic-api:
    build:
      context: ./Cognantic.server
      dockerfile: ./Cognantic.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=cognantic-db.postgres.database.azure.com;Port=5432;Database=cognanticdb;Username=cognantic;Password=Cognantic@123!;SSL Mode=Require;Trust Server Certificate=true;
      - Jwt__Issuer=CognanticAPI
      - Jwt__Audience=CognanticClients
      - Jwt__Key=CognanticSuperSecretKey2026_MustBe32CharsOrMore!
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped