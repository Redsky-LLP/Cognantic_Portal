name: Deploy Cognantic to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'Cognantic.server/**'
      - 'cognantic-client/**'
      - 'Dockerfile'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: "cognanticregistry.azurecr.io"
  CONTAINER_APP_NAME: "cognantic-api"
  RESOURCE_GROUP: "IC-cognaticapp"
  STATIC_WEB_APP_NAME: "cognantic-frontend"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0

    - name: Restore dependencies
      run: dotnet restore Cognantic.server/Cognantic.API/Cognantic.API.csproj

    - name: Build backend
      run: dotnet build Cognantic.server/Cognantic.API/Cognantic.API.csproj --configuration Release --no-restore

    - name: Run tests
      run: dotnet test Cognantic.server/Cognantic.API/Cognantic.API.csproj --configuration Release --no-build --verbosity normal
      continue-on-error: true

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.AZURE_CONTAINER_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image
      run: |
        docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}/cognantic-api:${{ github.sha }} -f Dockerfile .
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/cognantic-api:${{ github.sha }}
        docker tag ${{ env.AZURE_CONTAINER_REGISTRY }}/cognantic-api:${{ github.sha }} ${{ env.AZURE_CONTAINER_REGISTRY }}/cognantic-api:latest
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/cognantic-api:latest

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Deploy to Azure Container App
      uses: azure/cli@v2
      with:
        inlineScript: |
          az containerapp update --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.AZURE_CONTAINER_REGISTRY }}/cognantic-api:${{ github.sha }}

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'cognantic-client/package-lock.json'

      - name: Install dependencies
        run: |
          cd cognantic-client
          npm ci

      - name: Build frontend
        run: |
          cd cognantic-client
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "cognantic-client"
          output_location: "dist"
          skip_api_build: true
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true