services:
  - type: web
    name: cognantic-api
    runtime: image
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: cognantic-db
          property: connectionString
      - key: Jwt__Issuer
        sync: false
      - key: Jwt__Audience
        sync: false
      - key: Jwt__Key
        sync: false
      - key: AllowedOrigin
        sync: false

databases:
  - name: cognantic-db
    databaseName: cognantic_db
    plan: free
    ipAllowList: []  # Allow all connections (or specify Render's IPs)
